<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="img" aria-label="Synergy Business AI Assistant avatar">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a2540"/>
      <stop offset="100%" stop-color="#071a2e"/>
    </linearGradient>
    <linearGradient id="hair" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3d2a1a"/>
      <stop offset="100%" stop-color="#1f1409"/>
    </linearGradient>
    <linearGradient id="skin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5d3b0"/>
      <stop offset="100%" stop-color="#e8b88c"/>
    </linearGradient>
    <linearGradient id="shoulder" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c9a84c"/>
      <stop offset="100%" stop-color="#9c7d2c"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.4" r="0.7">
      <stop offset="0%" stop-color="#c9a84c" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#c9a84c" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- background -->
  <circle cx="100" cy="100" r="100" fill="url(#bg)"/>
  <circle cx="100" cy="100" r="100" fill="url(#glow)"/>

  <!-- shoulders / blazer -->
  <path d="M30,200 C30,150 65,135 100,135 C135,135 170,150 170,200 Z" fill="url(#shoulder)"/>
  <path d="M85,140 L100,165 L115,140 Z" fill="#ffffff" opacity="0.92"/>

  <!-- neck -->
  <rect x="90" y="115" width="20" height="25" rx="6" fill="url(#skin)"/>

  <!-- hair (back) -->
  <path d="M55,90 C55,50 75,35 100,35 C125,35 145,50 145,90 L145,140 C140,135 130,132 122,132 L78,132 C70,132 60,135 55,140 Z" fill="url(#hair)"/>

  <!-- face -->
  <ellipse cx="100" cy="92" rx="28" ry="34" fill="url(#skin)"/>

  <!-- subtle facial features (minimal, abstract) -->
  <ellipse cx="91" cy="92" rx="2.2" ry="2.8" fill="#3d2a1a"/>
  <ellipse cx="109" cy="92" rx="2.2" ry="2.8" fill="#3d2a1a"/>
  <path d="M93,108 Q100,112 107,108" stroke="#a85e4d" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- hair (front fringe) -->
  <path d="M72,75 C78,55 95,48 112,55 C122,60 130,72 132,82 C124,72 110,68 100,72 C90,68 78,72 72,82 Z" fill="url(#hair)"/>

  <!-- gold earring accent -->
  <circle cx="73" cy="100" r="2.2" fill="#e8c96b"/>
  <circle cx="127" cy="100" r="2.2" fill="#e8c96b"/>

  <!-- subtle online indicator -->
  <circle cx="170" cy="155" r="9" fill="#22c55e" stroke="#0a2540" stroke-width="3"/>
</svg>
