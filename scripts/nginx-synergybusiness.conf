# ---------------------------------------------------------------------------
# Synergy Business -- nginx server block
#
# Placeholders __DOMAIN__, __WWW_DOMAIN__, __APP_PORT__ are substituted by
# scripts/install-vps.sh. After install, certbot --nginx adds an HTTPS
# server block automatically.
#
# Note: this file is included from /etc/nginx/nginx.conf inside the `http`
# context, so all top-level directives here would be http-context. To avoid
# duplicating Ubuntu's default `gzip on;`, all per-site tuning lives INSIDE
# the server block.
# ---------------------------------------------------------------------------

upstream synergy_web_upstream {
    server 127.0.0.1:__APP_PORT__;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name __DOMAIN__ __WWW_DOMAIN__;

    # 30 MB cap to comfortably allow 25 MB document uploads to /api/portal/.
    client_max_body_size 30M;

    # Additional gzip MIME types beyond Ubuntu's default (text/html). Note
    # this REPLACES the http-context gzip_types when set here, but Ubuntu's
    # default leaves gzip_types unset, so we just declare the types we want.
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        text/xml
        application/xml
        application/xml+rss
        image/svg+xml;

    # ACME http-01 challenge (certbot will use this to issue SSL certs).
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/html;
        default_type "text/plain";
        try_files $uri =404;
    }

    # Everything else proxies to Next.js. Once HTTPS is set up, certbot
    # rewrites this block to redirect to https://__DOMAIN__$request_uri.
    location / {
        proxy_pass http://synergy_web_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 90s;
        proxy_send_timeout 90s;
    }
}
