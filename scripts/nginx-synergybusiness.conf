# ---------------------------------------------------------------------------
# Synergy Business — nginx server block
#
# Placeholders __DOMAIN__, __WWW_DOMAIN__, __APP_PORT__ are substituted by
# scripts/install-vps.sh. After install, certbot --nginx adds HTTPS server
# blocks below automatically.
# ---------------------------------------------------------------------------

# Upstream Next.js (PM2-managed)
upstream synergy_web_upstream {
    server 127.0.0.1:__APP_PORT__;
    keepalive 32;
}

# HTTP — certbot adds the redirect to HTTPS automatically once SSL is issued.
server {
    listen 80;
    listen [::]:80;
    server_name __DOMAIN__ __WWW_DOMAIN__;

    # ACME http-01 challenge (certbot)
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/html;
        default_type "text/plain";
        try_files $uri =404;
    }

    # Everything else proxies to Next.js. Once HTTPS is set up, certbot will
    # rewrite this block to redirect to https://__DOMAIN__$request_uri.
    location / {
        proxy_pass http://synergy_web_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 90s;
        proxy_send_timeout 90s;
    }
}

# Common settings — used by the HTTPS block certbot will write below.
# Save these in a snippet so we can include them after certbot rewrites.
# (We keep them inline for clarity; certbot won't strip locations.)

# Increase max upload to 30 MB to comfortably allow 25 MB document uploads
# even when proxied through nginx.
client_max_body_size 30M;

# Gzip
gzip on;
gzip_vary on;
gzip_min_length 1024;
gzip_proxied any;
gzip_comp_level 6;
gzip_types
    text/plain
    text/css
    text/xml
    application/json
    application/javascript
    application/xml+rss
    application/atom+xml
    image/svg+xml;
