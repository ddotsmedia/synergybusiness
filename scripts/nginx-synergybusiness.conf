# ---------------------------------------------------------------------------
# Synergy Business -- nginx config
#
# Two server blocks, one Next.js process behind both:
#
#   __DOMAIN__ + __WWW_DOMAIN__   -> public marketing site
#                                    /admin/* is hidden (302 to admin domain)
#
#   __ADMIN_DOMAIN__              -> admin panel
#                                    / redirects to /admin
#
# Placeholders are substituted by scripts/install-vps.sh. After the first
# install, certbot --nginx adds matching HTTPS server blocks automatically
# and rewrites the HTTP blocks to redirect to HTTPS.
# ---------------------------------------------------------------------------

upstream synergy_web_upstream {
    server 127.0.0.1:__APP_PORT__;
    keepalive 32;
}

# === FRONTEND: public marketing site ====================================
server {
    listen 80;
    listen [::]:80;
    server_name __DOMAIN__ __WWW_DOMAIN__;

    client_max_body_size 30M;

    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        text/xml
        application/xml
        application/xml+rss
        image/svg+xml;

    # ACME http-01 challenge (certbot)
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/html;
        default_type "text/plain";
        try_files $uri =404;
    }

    # Hide /admin from the public domain. Anyone hitting it gets bounced
    # to the dedicated admin host. We use 302 (not 301) so we can change
    # this routing later without browser-cache pain.
    location /admin {
        return 302 https://__ADMIN_DOMAIN__$request_uri;
    }

    # Public site -> Next.js
    location / {
        proxy_pass http://synergy_web_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 90s;
        proxy_send_timeout 90s;
    }
}

# === BACKEND: admin panel ===============================================
server {
    listen 80;
    listen [::]:80;
    server_name __ADMIN_DOMAIN__;

    client_max_body_size 30M;

    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        text/xml
        application/xml
        application/xml+rss
        image/svg+xml;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/html;
        default_type "text/plain";
        try_files $uri =404;
    }

    # Bare admin host -> /admin
    location = / {
        return 302 /admin;
    }

    # Everything else (admin pages, sign-in/up, _next assets, api) proxies
    # straight through. Server-side role checks gate /admin paths; Clerk
    # gates /portal paths.
    location / {
        proxy_pass http://synergy_web_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 90s;
        proxy_send_timeout 90s;
    }
}
